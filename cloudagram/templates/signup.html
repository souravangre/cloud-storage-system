{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<h2>Sign Up</h2>
<form method="POST" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Create Account</button>
</form>
<p class="mt-3">Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
