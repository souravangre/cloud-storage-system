{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2>Dashboard</h2>

<form method="POST" enctype="multipart/form-data" class="mb-4">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Upload File</button>
</form>

<h4>Your Uploaded Images</h4>

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
  {% for file in files %}
    <div class="col">
      <div class="card shadow-sm">
        <img src="{{ file.url }}" class="card-img-top" style="object-fit: cover; height: 200px;" alt="{{ file.name }}">
        <div class="card-body">
          <p class="card-text text-truncate">{{ file.name }}</p>
          <a href="{{ file.url }}" target="_blank" class="btn btn-sm btn-outline-primary">View Full</a>
        </div>
      </div>
    </div>
  {% empty %}
    <p class="text-muted">No images uploaded yet.</p>
  {% endfor %}
</div>

{% endblock %}
