{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="POST" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-success">Login</button>
</form>
<p class="mt-3">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock %}
